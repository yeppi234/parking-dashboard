<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 할인등록 현황</title>
  <style>
    /* ... (기존 스타일과 동일) ... */
  </style>
</head>
<body>

<!-- 로그인 모달 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🔐 로그인</h2>
    <div class="login-error" id="loginError">❌ 아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <input type="text" id="loginId" placeholder="아이디" value="oasis_g">
    <input type="password" id="loginPw" placeholder="비밀번호" value="wldnjs1234!">
    <button onclick="handleLogin()">로그인</button>
  </div>
</div>

<div class="container" id="mainContent" style="display:none;">
  <!-- ... (기존 헤더, 통계, 테이블과 동일) ... -->
</div>

<script>
// ============================================================
// ✅ Vercel 프록시 API 주소 사용!
// ============================================================
const API_URL = 'https://parking-dashboard-beryl.vercel.app/api/proxy/state/doListMst';

// ============================================================
// 🔐 로그인 처리 (프록시 경유)
// ============================================================
async function handleLogin() {
  const id = document.getElementById('loginId').value;
  const pw = document.getElementById('loginPw').value;
  const errorEl = document.getElementById('loginError');

  if (!id || !pw) {
    errorEl.textContent = '❌ 아이디와 비밀번호를 입력해주세요.';
    errorEl.style.display = 'block';
    return;
  }

  try {
    const hashedPw = sha256(pw);
    // 프록시를 통해 로그인 요청
    const response = await fetch('https://parking-dashboard-beryl.vercel.app/api/proxy/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      credentials: 'include',
      body: `userId=${encodeURIComponent(id)}&userPwd=${hashedPw}`
    });

    if (response.ok || response.status === 302) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      fetchData();
      setInterval(fetchData, 10000);
    } else {
      errorEl.textContent = '❌ 아이디 또는 비밀번호가 올바르지 않습니다.';
      errorEl.style.display = 'block';
    }
  } catch (error) {
    errorEl.textContent = '❌ 서버 연결에 실패했습니다.';
    errorEl.style.display = 'block';
  }
}

// ============================================================
// 📊 데이터 가져오기 (프록시 경유)
// ============================================================
async function fetchData() {
  try {
    const today = new Date();
    const dateStr = today.getFullYear() +
      String(today.getMonth() + 1).padStart(2, '0') +
      String(today.getDate()).padStart(2, '0');

    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      credentials: 'include',
      body: new URLSearchParams({
        startDate: dateStr,
        endDate: dateStr,
        account_no: 'oasis_g',
        rowcount: '50000'
      })
    });

    if (response.status === 403 || response.status === 401) {
      handleLogout();
      return;
    }

    const result = await response.json();
    renderData(result);
  } catch (error) {
    console.error('데이터 로드 실패:', error);
    document.getElementById('tableBody').innerHTML = 
      '<tr><td colspan="9" style="text-align:center;padding:40px;color:#ef4444;">⚠️ 데이터를 불러오지 못했습니다.</td></tr>';
  }
}

// ============================================================
// 🔧 로그아웃, 렌더링, SHA-256 함수는 기존과 동일
// ============================================================
// ... (나머지 함수들은 이전과 동일) ...
</script>

</body>
</html>
